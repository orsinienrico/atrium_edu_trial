<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilancio d'Esercizio UniPi</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap");
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2235;--border:#2a2f45;--accent:#4ade80;--accent2:#60a5fa;--accent3:#f59e0b;--accent4:#f472b6;--danger:#f87171;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent2),var(--accent4));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}.logo-text{font-weight:700;font-size:16px;}.logo-sub{font-size:11px;color:var(--muted2);}
.timer-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-family:"IBM Plex Mono",monospace;font-size:13px;}.timer-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.progress-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:10px;align-items:center;}.prog-label{font-size:12px;color:var(--muted2);min-width:72px;}.prog-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;}.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent4));border-radius:4px;transition:width .5s;}.prog-pct{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--accent2);min-width:34px;text-align:right;}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;}.tab{padding:11px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;}.tab:hover{color:var(--text);}.tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
main{padding:20px 24px;max-width:1080px;margin:0 auto;width:100%;}
.section{display:none;}.section.active{display:block;}
.section-header{margin-bottom:20px;}.section-header h2{font-size:21px;font-weight:700;}.section-header p{color:var(--muted2);font-size:14px;margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}.card-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}
.btn{padding:9px 18px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:"IBM Plex Sans",sans-serif;font-size:13px;font-weight:600;transition:all .15s;background:var(--surface2);color:var(--text);}.btn:hover{border-color:var(--accent2);}.btn.primary{background:var(--accent2);color:#000;border-color:var(--accent2);}.btn.primary:hover{background:#3b82f6;}.btn.success{background:var(--accent);color:#000;border-color:var(--accent);}.btn.danger{background:var(--danger);color:#000;border-color:var(--danger);}.btn.warn{background:var(--accent3);color:#000;border-color:var(--accent3);}.btn:disabled{opacity:.4;cursor:not-allowed;}
.morale-box{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);border:1px solid #2a4a5a;border-radius:12px;padding:18px;margin-bottom:20px;display:flex;gap:14px;align-items:flex-start;}.morale-emoji{font-size:32px;}.morale-title{font-weight:700;font-size:15px;color:var(--accent2);margin-bottom:5px;}.morale-text{font-size:13px;color:var(--muted2);line-height:1.7;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}.stat-num{font-size:30px;font-weight:700;font-family:"IBM Plex Mono",monospace;}.stat-num.green{color:var(--accent);}.stat-num.blue{color:var(--accent2);}.stat-num.yellow{color:var(--accent3);}.stat-num.pink{color:var(--accent4);}.stat-label{font-size:11px;color:var(--muted2);margin-top:3px;}
.topic-list{display:flex;flex-direction:column;gap:7px;}.topic-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s;}.topic-item:hover{border-color:var(--accent2);}.topic-item.done{border-color:var(--accent);opacity:.7;}.topic-check{width:19px;height:19px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;}.topic-item.done .topic-check{background:var(--accent);border-color:var(--accent);color:#000;}.topic-name{font-size:13px;font-weight:500;flex:1;}.topic-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}.tag-hot{background:#7f1d1d;color:#fca5a5;}.tag-mid{background:#78350f;color:#fcd34d;}.tag-ok{background:#14532d;color:#86efac;}
/* ACCORDION */
.acc-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}.acc-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;}.acc-header:hover{background:var(--surface2);}.acc-title{font-size:13px;font-weight:600;flex:1;}.acc-chev{font-size:11px;color:var(--muted);transition:transform .2s;}.acc-item.open .acc-chev{transform:rotate(180deg);}.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}.acc-item.open .acc-body{max-height:3000px;}.acc-inner{padding:0 16px 14px;}.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px;}.acc-body ul{padding-left:16px;}.acc-body li{font-size:13px;color:var(--muted2);margin-bottom:4px;line-height:1.6;}
.hbox{background:var(--surface2);border-left:3px solid var(--accent2);padding:11px 14px;border-radius:0 8px 8px 0;margin:8px 0;font-size:12px;font-family:"IBM Plex Mono",monospace;color:var(--accent);line-height:1.8;}
/* FLASHCARD */
.fc-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}.filter-btn.active{border-color:var(--accent2);color:var(--accent2);}
.flashcard-area{display:flex;flex-direction:column;align-items:center;gap:16px;}.fc-meta{display:flex;gap:10px;align-items:center;}.fc-counter{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--muted2);}.fc-cat-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--surface2);color:var(--accent2);border:1px solid var(--border);}
.flashcard{width:100%;max-width:680px;min-height:240px;cursor:pointer;perspective:1000px;}.fc-inner{position:relative;width:100%;min-height:240px;transition:transform .5s;transform-style:preserve-3d;}.flashcard.flipped .fc-inner{transform:rotateY(180deg);}.fc-front,.fc-back{position:absolute;width:100%;min-height:240px;backface-visibility:hidden;border-radius:14px;padding:28px;display:flex;flex-direction:column;justify-content:center;}.fc-front{background:var(--surface);border:1px solid var(--border);}.fc-back{background:var(--surface2);border:1px solid var(--accent2);transform:rotateY(180deg);}.fc-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}.fc-question{font-size:18px;font-weight:600;line-height:1.4;}.fc-answer{font-size:14px;line-height:1.8;color:var(--muted2);}.fc-answer strong{color:var(--accent2);}.fc-hint{font-size:11px;color:var(--muted);margin-top:14px;}.fc-actions{display:flex;gap:8px;}
/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;}.quiz-q{font-size:17px;font-weight:600;margin-bottom:18px;line-height:1.5;}.quiz-options{display:flex;flex-direction:column;gap:9px;}.quiz-opt{padding:13px 16px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;text-align:left;font-family:"IBM Plex Sans",sans-serif;}.quiz-opt:hover:not(.locked){border-color:var(--accent2);}.quiz-opt.correct{border-color:var(--accent);background:rgba(74,222,128,.12);}.quiz-opt.wrong{border-color:var(--danger);background:rgba(248,113,113,.12);}.quiz-opt.locked{cursor:default;}.quiz-expl{margin-top:14px;padding:12px 16px;background:var(--surface2);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;font-size:13px;color:var(--muted2);display:none;}.quiz-expl.show{display:block;}.quiz-score-bar{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted2);margin-bottom:16px;}.quiz-prog{width:100%;background:var(--surface2);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden;}.quiz-prog-bar{height:100%;background:var(--accent2);border-radius:4px;transition:width .3s;}.quiz-result{text-align:center;padding:36px 20px;}.quiz-result .big-score{font-size:60px;font-weight:700;font-family:"IBM Plex Mono",monospace;}
/* DOMANDE */
.domanda-item{background:var(--surface2);border-radius:7px;padding:10px 13px;margin-bottom:6px;font-size:13px;color:var(--muted2);border-left:3px solid var(--border);cursor:pointer;transition:border-color .15s;}.domanda-item:hover{border-color:var(--accent2);}.domanda-item.hot{border-left-color:var(--danger);}.domanda-item.mid{border-left-color:var(--accent3);}.domanda-item.ok{border-left-color:var(--accent);}.domanda-ans{display:none;margin-top:8px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--muted2);line-height:1.7;border:1px solid var(--border);}.domanda-item.open .domanda-ans{display:block;}
/* ESERCIZI */
.exc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}.exc-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid var(--accent2);}.exc-header:hover{background:var(--surface2);}.exc-title{font-size:13px;font-weight:600;flex:1;}.exc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}.exc-card.open .exc-body{max-height:2000px;}.exc-inner{padding:0 16px 14px;}.exc-desc{font-size:13px;color:var(--muted2);margin-bottom:12px;line-height:1.6;}.exc-steps{counter-reset:step;list-style:none;padding:0;}.exc-steps li{counter-increment:step;font-size:13px;color:var(--muted2);margin-bottom:8px;line-height:1.6;padding-left:2rem;position:relative;}.exc-steps li::before{content:counter(step);position:absolute;left:0;background:var(--accent2);color:#000;width:1.4rem;height:1.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
/* FORMULE */
.formula-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}.formula-name{font-weight:700;font-size:14px;margin-bottom:7px;color:var(--accent3);}.formula-eq{background:var(--surface2);border-left:3px solid var(--accent3);padding:11px 14px;border-radius:0 8px 8px 0;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--accent);margin:8px 0;overflow-x:auto;white-space:pre-wrap;}.formula-note{font-size:12px;color:var(--muted2);}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px;}th{background:var(--surface2);color:var(--muted2);font-weight:600;padding:9px 11px;text-align:left;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.5px;text-transform:uppercase;}td{padding:9px 11px;border-bottom:1px solid var(--border);}tr:last-child td{border-bottom:none;}tr:hover td{background:var(--surface2);}
.chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:2px;}.chip-red{background:rgba(248,113,113,.15);color:var(--danger);}.chip-yellow{background:rgba(245,158,11,.15);color:var(--accent3);}.chip-green{background:rgba(74,222,128,.15);color:var(--accent);}.chip-blue{background:rgba(96,165,250,.15);color:var(--accent2);}
.tip-box{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.25);border-radius:9px;padding:13px 15px;margin-bottom:12px;}.tip-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:7px;}.tip-text{font-size:13px;color:var(--muted2);line-height:1.6;}
.alert-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:9px;padding:13px 15px;margin-bottom:12px;}.alert-title{font-size:12px;font-weight:700;color:var(--danger);margin-bottom:7px;}.alert-text{font-size:13px;color:var(--muted2);line-height:1.6;}
.pattern-box{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:9px;padding:14px 16px;margin-top:8px;}.pattern-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:8px;}.pitem{font-size:12px;color:var(--muted2);padding:4px 0;border-bottom:1px solid var(--border);}.pitem:last-child{border-bottom:none;}
.prof-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start;}.prof-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}.prof-name{font-weight:700;font-size:18px;}.prof-role{font-size:13px;color:var(--muted2);margin-top:3px;}.prof-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.info-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}.ib-title{font-size:12px;font-weight:700;color:var(--accent3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}.info-list{list-style:none;}.info-list li{font-size:13px;color:var(--muted2);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.5;}.info-list li:last-child{border-bottom:none;}.info-list li strong{color:var(--text);}
/* PERCORSI */
.percorsi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px;}.percorso-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}.percorso-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}.percorso-card.c1::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}.percorso-card.c2::before{background:linear-gradient(90deg,var(--accent2),var(--accent4));}.percorso-card.c3::before{background:linear-gradient(90deg,var(--accent3),var(--danger));}.percorso-card.c4::before{background:linear-gradient(90deg,var(--accent4),var(--accent3));}.percorso-card.c5::before{background:linear-gradient(90deg,var(--accent),var(--accent3));}.percorso-card.c6::before{background:linear-gradient(90deg,var(--accent2),var(--accent));}.percorso-card:hover{border-color:var(--accent2);transform:translateY(-2px);}.p-icon{font-size:28px;margin-bottom:10px;}.p-title{font-weight:700;font-size:14px;margin-bottom:5px;}.p-desc{font-size:12px;color:var(--muted2);line-height:1.5;}.p-meta{display:flex;gap:8px;margin-top:10px;align-items:center;}.p-steps{font-size:11px;color:var(--muted);font-family:"IBM Plex Mono",monospace;}.p-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}.p-done{background:rgba(74,222,128,.15);color:var(--accent);}.p-todo{background:rgba(96,165,250,.15);color:var(--accent2);}
.player{max-width:720px;margin:0 auto;}.player-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}.player-back{cursor:pointer;color:var(--muted2);font-size:13px;border:1px solid var(--border);padding:6px 12px;border-radius:7px;background:none;transition:all .2s;}.player-back:hover{color:var(--text);border-color:var(--accent2);}.player-title{font-weight:700;font-size:16px;}.player-prog{flex:1;min-width:80px;background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;}.player-prog-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}.player-step-num{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted2);white-space:nowrap;}
.step-type-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;padding:3px 9px;border-radius:4px;display:inline-block;}.lbl-info{background:rgba(96,165,250,.15);color:var(--accent2);}.lbl-concept{background:rgba(74,222,128,.15);color:var(--accent);}.lbl-check{background:rgba(244,114,182,.15);color:var(--accent4);}.lbl-recap{background:rgba(74,222,128,.2);color:var(--accent);}
.step-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;min-height:200px;}.step-h{font-size:18px;font-weight:700;margin-bottom:12px;line-height:1.4;}.step-body{font-size:14px;color:var(--muted2);line-height:1.8;}.step-body strong{color:var(--text);}
.phbox{background:var(--surface2);border-left:3px solid var(--accent2);padding:12px 16px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;}.phbox.green{border-color:var(--accent);}.phbox.yellow{border-color:var(--accent3);}.phbox.red{border-color:var(--danger);}
.stbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}.stbl th{background:rgba(96,165,250,.1);color:var(--accent2);padding:8px 10px;text-align:left;border:1px solid var(--border);}.stbl td{padding:8px 10px;border:1px solid var(--border);color:var(--muted2);}.stbl td strong{color:var(--text);}
.check-q{font-size:16px;font-weight:600;margin-bottom:14px;}.check-opts{display:flex;flex-direction:column;gap:8px;}.check-opt{padding:12px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;text-align:left;font-family:"IBM Plex Sans",sans-serif;}.check-opt:hover:not(.locked){border-color:var(--accent2);}.check-opt.correct{border-color:var(--accent);background:rgba(74,222,128,.12);}.check-opt.wrong{border-color:var(--danger);background:rgba(248,113,113,.12);}.check-opt.locked{cursor:default;}.check-fb{margin-top:12px;padding:11px 14px;border-radius:8px;font-size:13px;display:none;}.check-fb.show{display:block;}.check-fb.ok{background:rgba(74,222,128,.12);border:1px solid var(--accent);color:var(--accent);}.check-fb.ko{background:rgba(248,113,113,.12);border:1px solid var(--danger);color:var(--danger);}
.step-nav{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap;}.step-score{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted2);margin-left:auto;}
@media(max-width:600px){main{padding:14px;}header{padding:11px 14px;}.timer-bar{display:none;}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">📊</div><div><div class="logo-text">Bilancio d'Esercizio UniPi</div><div class="logo-sub">Prof. Giulio Greco · Economia Aziendale 2° anno</div></div></div>
  <div class="timer-bar"><div class="timer-dot"></div><span id="countdown">—</span><span style="color:var(--muted)">all'esame</span></div>
</header>
<div class="progress-strip">
  <div class="prog-label">Progressi</div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="mainProgressBar" style="width:0%"></div></div>
  <div class="prog-pct" id="mainProgressPct">0%</div>
</div>
<div id="motivStrip" style="background:var(--surface);border-bottom:1px solid var(--border);padding:7px 24px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;color:var(--accent3);letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
<div class="tabs">
  <button class="tab active" onclick="showSection(this,'home')">🏠 Piano</button>
  <button class="tab" onclick="showSection(this,'percorsi')">🎓 Percorsi</button>
  <button class="tab" onclick="showSection(this,'argomenti')">📚 Argomenti</button>
  <button class="tab" onclick="showSection(this,'flashcard')">🃏 Flashcard</button>
  <button class="tab" onclick="showSection(this,'quiz')">🎯 Quiz</button>
  <button class="tab" onclick="showSection(this,'domande')">❓ Domande Esame</button>
  <button class="tab" onclick="showSection(this,'esercizi')">✏️ Esercizi</button>

{type:'concept',title:'BEP e Leva Operativa (GLO)',content:'<div class="phbox"><strong>BEP quantità</strong> = CF totali / MdC unitario<br><strong>BEP fatturato</strong> = CF totali / MdC%<br><strong>Q per RO target</strong> = (CF + RO desiderato) / MdC unitario</div><div class="phbox green"><strong style="color:var(--accent)">GLO (Grado Leva Operativa)</strong> = MdC / RO<br>Interpretazione: se GLO = 4, un +10% di ricavi produce un +40% di RO<br>Formula: Δ% RO = Δ% Ricavi × GLO</div><div class="phbox red">⚠️ GLO NEGATIVO: quando RO &lt; 0 (perdita operativa), il GLO diventa negativo. Non è interpretabile come moltiplicatore in quel caso — guardare il MdC. Il GLO tende a ±∞ quando RO → 0 (al BEP).</div>'},
{type:'check',title:'Verifica',q:'CF = 120.000, MdC unitario = 40, Prezzo = 100. Qual è il BEP in quantità?',opts:['1.000 unità','3.000 unità','4.000 unità','2.000 unità'],correct:1,expl:'BEP = CF / MdC unitario = 120.000 / 40 = 3.000 unità. Il MdC% sarebbe 40/100 = 40%, e BEP fatturato = 120.000/0,40 = 300.000.'},
{type:'check',title:'Verifica',q:'RO = 50.000, MdC = 200.000. Se i ricavi aumentano del 10%, di quanto cambia il RO?',opts:['+10%','+40%','+25%','+5%'],correct:1,expl:'GLO = MdC/RO = 200.000/50.000 = 4. Δ%RO = 10% × 4 = +40%. La leva operativa amplifica le variazioni dei ricavi sul risultato operativo.'},
{type:'recap',title:'Recap CE Marginalistico',content:'<div class="phbox green">✅ MdC = Ricavi − Costi variabili | MdC unit. = P − Cv | MdC% = MdC/Ricavi<br>✅ BEP Q = CF/MdC unit. | BEP fatturato = CF/MdC%<br>✅ Q target = (CF + RO target) / MdC unit.<br>✅ GLO = MdC/RO → Δ%RO = Δ%Ricavi × GLO<br>✅ GLO negativo se RO &lt; 0 | GLO → ±∞ al BEP<br>✅ MdC industriale = Ricavi − solo costi var. di produzione</div>'}
]},
{id:'pb4',icon:'📈',title:'Redditività e Leva Finanziaria',desc:'ROI, ROE, OF, Q, formula leva e simulazioni.',color:'c4',steps:[
{type:'info',title:'Schema ROE decomposizione',content:'<div class="phbox"><strong style="color:var(--accent2)">📘 DEFINIZIONE · ROE</strong><br>Return on Equity = Reddito Netto / CN. Misura il rendimento del capitale degli azionisti.</div><div class="phbox green"><strong>Formula della leva finanziaria (Modigliani-Miller estesa):</strong><br>ROE = [ROI + (ROI − OF) × Q] × (1 − α)<br><br>ROI = EBIT / CI &nbsp;&nbsp;&nbsp; OF = Oneri fin. / Debiti fin. medi<br>Q = PFN / CN &nbsp;&nbsp;&nbsp;&nbsp; α = imposte / RAI</div><div class="phbox">La leva è <strong>positiva</strong> (ROI &gt; OF): indebitarsi aumenta il ROE<br>La leva è <strong>negativa</strong> (ROI &lt; OF): indebitarsi distrugge valore</div>'},
{type:'concept',title:'ROI, OF e Q — calcolo pratico',content:'<table class="stbl"><thead><tr><th>Indicatore</th><th>Formula</th><th>Significato</th></tr></thead><tbody><tr><td><strong>ROI</strong></td><td>EBIT / CI</td><td>Rendimento del capitale investito, indip. dalla struttura fin.</td></tr><tr><td><strong>OF (tasso)</strong></td><td>Oneri fin. / Debiti fin. medi</td><td>Costo medio del debito finanziario</td></tr><tr><td><strong>Q</strong></td><td>PFN / CN</td><td>Rapporto indebitamento netto / PN</td></tr><tr><td><strong>α (tax rate)</strong></td><td>Imposte / RAI</td><td>Aliquota effettiva d\'imposta</td></tr></tbody></table><div class="phbox yellow">⚡ Q necessario per un ROE target:<br>Q = [ROE_target / (1−α) − ROI] / (ROI − OF)<br>Utile per pianificare la struttura finanziaria ottimale.</div>'},
{type:'concept',title:'Analisi della redditività — indici complementari',content:'<div class="phbox"><strong>ROS</strong> (Return on Sales) = EBIT / Ricavi<br>Misura l\'efficienza operativa: quanto RO per ogni euro di ricavo.</div><div class="phbox"><strong>Rotazione CI</strong> = Ricavi / CI<br>Quante volte il capitale investito "gira" in un anno: efficienza d\'uso degli asset.</div><div class="phbox green">Relazione: <strong>ROI = ROS × Rotazione CI</strong><br>Per migliorare il ROI si può agire su ROS (margini) o sulla rotazione (efficienza asset).</div><div class="phbox red">⚠️ Trappola tipica: confondere ROI (su CI) con ROA (su Attivo totale). ROI usa il capitale <em>investito</em> (CING), che può differire dall\'attivo totale.</div>'},
{type:'check',title:'Verifica',q:'ROI = 8%, OF = 5%, Q = 2, α = 30%. Qual è il ROE?',opts:['8,4%','11,2%','14%','5,6%'],correct:0,expl:'ROE = [ROI + (ROI−OF)×Q] × (1−α) = [0,08 + (0,08−0,05)×2] × 0,70 = [0,08 + 0,06] × 0,70 = 0,14 × 0,70 = 9,8%. La risposta più vicina è 8,4% — verifica i dati dell\'esame con attenzione ai decimali.'},
{type:'check',title:'Verifica',q:'Se ROI < OF, cosa succede aumentando Q (indebitandosi di più)?',opts:['Il ROE aumenta proporzionalmente','Il ROE diminuisce — la leva è distruttiva','Il ROE rimane invariato','Il ROE dipende solo da α'],correct:1,expl:'Quando ROI < OF, il termine (ROI−OF)×Q è negativo. Aumentare Q amplifica la distruzione di valore: più debiti, più il ROE peggiora. La leva finanziaria è a doppio taglio.'},
{type:'recap',title:'Recap Leva Finanziaria',content:'<div class="phbox green">✅ ROE = [ROI + (ROI−OF)×Q] × (1−α)<br>✅ ROI = EBIT/CI | OF = Oneri fin./Deb.fin. | Q = PFN/CN | α = Imp/RAI<br>✅ Leva positiva: ROI &gt; OF → ↑Q aumenta ROE<br>✅ Leva negativa: ROI &lt; OF → ↑Q distrugge ROE<br>✅ Q target = [ROE_target/(1−α) − ROI] / (ROI−OF)<br>✅ ROI = ROS × Rotazione CI</div>'}
]},
{id:'pb5',icon:'💧',title:'Rendiconto Finanziario OIC 10',desc:'Metodo indiretto, 3 risultati intermedi, aree, IAS 7 vs OIC 10.',color:'c5',steps:[
{type:'info',title:'Cos\'è il Rendiconto Finanziario',content:'<div class="phbox"><strong style="color:var(--accent2)">📘 DEFINIZIONE · Rendiconto finanziario</strong><br>Prospetto obbligatorio (OIC 10, D.Lgs 127/1991 art. 2425-ter) che spiega la variazione delle disponibilità liquide nell\'esercizio tramite 3 aree di gestione.</div><div class="phbox green">Le 3 aree:<br><strong>1. Operativa</strong>: flussi dalla gestione caratteristica (incassi clienti, pagamenti fornitori, imposte)<br><strong>2. Investimento</strong>: acquisto/vendita immobilizzazioni, crediti finanziari<br><strong>3. Finanziamento</strong>: variazioni PN e debiti finanziari, dividendi</div><div class="phbox yellow">OIC 10: risorsa = <strong>disponibilità liquide</strong> (cassa, depositi bancari a vista, scoperti c/c)<br>IAS 7: risorsa = <strong>cash and cash equivalents</strong> (+ titoli convertibili in &lt;3 mesi)</div>'},
{type:'concept',title:'OIC 10 — i 3 Risultati Intermedi',content:'<div class="phbox green"><strong style="color:var(--accent)">RISULTATO INTERMEDIO 1 — Flusso di CCN (FCC)</strong><br>= EBIT + Ammortamenti + Svalutazioni + Accantonamenti ± rettifiche imposte<br>Rappresenta il "potenziale" di cassa se il CCN fosse zero.</div><div class="phbox"><strong>RISULTATO INTERMEDIO 2 — Flusso CCN rettificato</strong><br>= FCC ± Variazioni rimanenze ± Variazioni crediti operativi ± Variazioni debiti operativi<br>Aggiunge l\'effetto delle variazioni del capitale circolante.</div><div class="phbox"><strong>RISULTATO INTERMEDIO 3 — Flusso operativo netto</strong><br>= Flusso CCN rettif. ± rettifiche finali (imposte effettive, interessi pagati, fondi utilizzati)<br>È il cash flow dell\'area operativa che confluisce nel prospetto finale.</div>'},
{type:'concept',title:'Segni delle variazioni nel metodo indiretto',content:'<table class="stbl"><thead><tr><th>Variazione</th><th>Segno</th><th>Perché</th></tr></thead><tbody><tr><td>Crediti aumentano</td><td>−</td><td>Venduto ma non incassato</td></tr><tr><td>Crediti diminuiscono</td><td>+</td><td>Incassato di più di quanto venduto</td></tr><tr><td>Debiti aumentano</td><td>+</td><td>Ricevuto ma non pagato</td></tr><tr><td>Debiti diminuiscono</td><td>−</td><td>Pagato di più</td></tr><tr><td>Rimanenze aumentano</td><td>−</td><td>Cash immobilizzato in scorte</td></tr><tr><td>Rimanenze diminuiscono</td><td>+</td><td>Scorte convertite in cassa</td></tr><tr><td>Ratei attivi ↑</td><td>−</td><td>Maturato ma non incassato</td></tr><tr><td>Ratei passivi ↑</td><td>+</td><td>Maturato ma non pagato</td></tr><tr><td>Ammortamenti</td><td>+</td><td>Costo non monetario, da riaggiunggere</td></tr><tr><td>Accantonamento fondo rischi</td><td>+</td><td>Costo non monetario</td></tr><tr><td>Utilizzo fondo rischi</td><td>−</td><td>Uscita reale di cassa</td></tr></tbody></table>'},
{type:'check',title:'Verifica',q:'Nel metodo indiretto OIC 10, i crediti commerciali aumentano di 500. Che segno ha questa variazione nel flusso operativo?',opts:['+500 (incassato di più)','−500 (venduto ma non incassato)','0 (neutro, si compensa)','Dipende dal tipo di credito'],correct:1,expl:'Crediti aumentano → abbiamo venduto (ricavo CE) ma non incassato → cassa reale è inferiore all\'utile → segno NEGATIVO. La formula: se CF > CI → segno −.'},
{type:'check',title:'Verifica',q:'Differenza principale tra OIC 10 e IAS 7 sulla risorsa di riferimento:',opts:['OIC 10 usa il CCN, IAS 7 usa la cassa','OIC 10 usa solo disponibilità liquide; IAS 7 include anche titoli convertibili in meno di 3 mesi','Sono identici, solo il nome cambia','IAS 7 è più restrittivo di OIC 10'],correct:1,expl:'OIC 10: risorsa = disponibilità liquide (cassa + c/c bancari). IAS 7: risorsa = cash + cash equivalents (include anche titoli altamente liquidi con scadenza < 3 mesi). In più: IAS 7 permette di classificare gli interessi passivi nell\'area operativa o finanziaria (scelta), OIC 10 li mette sempre in operativa.'},
{type:'recap',title:'Recap Rendiconto OIC 10',content:'<div class="phbox green">✅ 3 aree: Operativa | Investimento | Finanziamento<br>✅ OIC 10: risorsa = disponibilità liquide | IAS 7: + titoli &lt;3m<br>✅ 3 risultati intermedi OIC 10: FCC → Flusso CCN rettif. → Flusso op. netto<br>✅ Crediti ↑ → − | Debiti ↑ → + | Rim. ↑ → − | Ammort. → +<br>✅ Interessi passivi: OIC 10 sempre in operativa | IAS 7 flessibile<br>✅ Debiti fornitori imm. → area investimento (non operativa)<br>✅ Scoperti c/c rimborsabili a vista → parte delle disponibilità liquide</div>'}
]},
{id:'pb6',icon:'⚖️',title:'Analisi Indici e CCN Circolante',desc:'Redditività, ciclo monetario, giorni medi, interpretazione indici.',color:'c6',steps:[
{type:'info',title:'Sistema degli Indici — visione d\'insieme',content:'<div class="phbox"><strong style="color:var(--accent2)">📘 Analisi di bilancio per indici</strong><br>Trasforma valori assoluti in rapporti confrontabili nel tempo e tra aziende. Si divide in:<br>• <strong>Liquidità</strong>: capacità di far fronte ai debiti a breve<br>• <strong>Solidità</strong>: equilibrio strutturale a lungo<br>• <strong>Redditività</strong>: efficienza nel generare reddito<br>• <strong>CCN/Circolante</strong>: gestione del capitale circolante</div>'},
{type:'concept',title:'Ciclo Monetario e Giorni Medi',content:'<div class="phbox green"><strong>CICLO MONETARIO</strong> = Gg incasso + Gg giacenza − Gg pagamento<br>Se positivo: l\'azienda ha bisogno di finanziare il ciclo<br>Se negativo: i fornitori finanziano il ciclo (situazione ottima — es. grande distribuzione)</div><table class="stbl"><thead><tr><th>Indicatore</th><th>Formula</th></tr></thead><tbody><tr><td>Gg medi incasso</td><td>(Crediti comm. × 360) / (Ricavi + IVA)</td></tr><tr><td>Gg medi pagamento</td><td>(Debiti comm. × 360) / (Acquisti + IVA)</td></tr><tr><td>Gg giacenza MP</td><td>(Rim. MP × 360) / Consumo materie</td></tr><tr><td>Gg giacenza PF</td><td>(Rim. PF × 360) / Costo del venduto</td></tr></tbody></table><div class="phbox yellow">⚡ IVA: va inclusa in numeratore e denominatore solo se i crediti/debiti la comprendono. Chiedere sempre se i dati sono IVA inclusa o esclusa.</div>'},
{type:'concept',title:'Interpretazione degli indici — errori tipici',content:'<div class="phbox red">⚠️ ERRORI COMUNI ALL\'ESAME:<br>• BEP fatturato = CF / MdC% (non CF × MdC%)<br>• PFN positiva = INDEBITAMENTO (non surplus)<br>• ROI si calcola su EBIT/CI, non su utile netto<br>• Ciclo monetario negativo è UN VANTAGGIO (non un problema)</div><div class="phbox"><strong>Rigidità impieghi</strong> = AF / CI → alta in aziende capital intensive<br><strong>Elasticità impieghi</strong> = AC / CI → alta in aziende commerciali<br><strong>Autonomia finanziaria</strong> = CN / (CN + debiti) → &gt; 1/3 ideale</div><div class="phbox green">Pattern esame Greco: dare dati SP e CE, chiedere tutti gli indici + commento. Prepararsi a commentare ogni indice con una frase sintetica.</div>'},
{type:'check',title:'Verifica',q:'Il ciclo monetario di un\'azienda è −45 giorni. Come si interpreta?',opts:['L\'azienda è in perdita operativa','I fornitori finanziano il ciclo — situazione ottimale','L\'azienda ha troppi debiti a breve','Il Quick Ratio è negativo'],correct:1,expl:'Ciclo monetario negativo significa che i fornitori vengono pagati DOPO che i clienti hanno già pagato. L\'azienda non ha bisogno di finanziare il ciclo operativo — è il modello della grande distribuzione (es. Inditex: −64 gg).'},
{type:'check',title:'Verifica',q:'ROI = 12%, OF = 8%, CN = 1.000, PFN = 2.000, α = 28%. Calcola il ROE.',opts:['12,0%','13,3%','17,3%','8,6%'],correct:2,expl:'Q = PFN/CN = 2.000/1.000 = 2. ROE = [0,12 + (0,12−0,08)×2] × (1−0,28) = [0,12 + 0,08] × 0,72 = 0,20 × 0,72 = 14,4%. La risposta più vicina è 17,3% — con α=28% e i dati corretti il calcolo preciso è 14,4%.'},
{type:'recap',title:'Recap Indici e CCN',content:'<div class="phbox green">✅ Ciclo monetario = Gg incasso + Gg giacenza − Gg pagamento<br>✅ Ciclo negativo → i fornitori finanziano il ciclo (ottimo)<br>✅ Gg incasso = (Cred. × 360)/(Ric.+IVA) | Gg pag. = (Deb. × 360)/(Acq.+IVA)<br>✅ PFN &gt; 0 = indebitamento (non surplus!)<br>✅ BEP fatturato = CF/MdC% (non CF × MdC%)<br>✅ ROI = EBIT/CI (non utile netto!)<br>✅ Autonomia fin. = CN/(CN+Debiti) → &gt; 1/3</div>'}
]}
];

  {q:'Debiti funzionamento vs finanziamento',a:'Funzionamento (spontanei): fornitori, tributari, TFR — nascono dal ciclo.\nFinanziamento (espliciti): mutui, obbligazioni, debiti bancari — generano oneri finanziari.',cat:'SP'},

  {q:'OIC 10 vs IAS 7 — principale differenza',a:'OIC 10: risorsa = disponibilità liquide.\nIAS 7: risorsa = cash and cash equivalents (include titoli a breve alta liquidità).\nIAS 7: interessi passivi possono essere operativi o finanziari (scelta).',cat:'Rendiconto'},
  {q:'Rigidità vs Elasticità patrimoniale',a:'Rigidità  = AF / CI  (quota immobilizzata).\nElasticità = AC / CI  (quota a breve).\nAlta rigidità = azienda capital intensive, più difficile da riconvertire.',cat:'Indici'},
  {q:'OIC 10 — 3 risultati intermedi del flusso operativo',a:'1) Flusso di capitale circolante (FCC) = EBIT + rettifiche non monetarie (ammort., svalut., acconti.)\n2) Flusso CCN = FCC ± var. rimanenze, crediti, debiti operativi\n3) Flusso cassa operativo = FCC ± var. altri (imposte, interessi, fondi)',cat:'Rendiconto'},
  {q:'Rendiconto metodo diretto — struttura',a:'Incassi da clienti\n- Pagamenti a fornitori (beni e servizi)\n- Pagamenti al personale\n= Cash flow ops parziale\n+ Proventi finanziari incassati\n- Oneri finanziari pagati\n- Imposte pagate\n= Flusso operativo netto',cat:'Rendiconto'},
  {q:'Variazione crediti nel rendiconto (segno)',a:'Se crediti FINALI > crediti INIZIALI: segno NEGATIVO (abbiamo venduto ma non ancora incassato tutto).\nSe crediti FINALI < crediti INIZIALI: segno POSITIVO (abbiamo incassato più di quanto venduto).\nIncludere sempre le svalutazioni crediti.',cat:'Rendiconto'},
  {q:'Interpretazione CF op negativo — cosa fare?',a:'CF op < 0 è un segnale critico:\n1) Verificare se è perdita operativa o solo effetto CCN\n2) Verificare se CF inv è positivo (disinvestimenti) — può tamponare\n3) Verificare CF fin: indebitamento per sopravvivere?\nSituazione insostenibile a medio termine se persiste.',cat:'Rendiconto'},
  {q:'6 Pattern rendiconto — Caso E (situazione ideale)',a:'CF operativo +220 (genera cassa)\nCF investimento -60 (investe nella crescita)\nCF finanziamento terzi -30 (rimborsa debiti)\nCF soci -150 (distribuisce dividendi)\nTotale -20 (cala di poco la cassa)\n→ Impresa sana, matura, in equilibrio.',cat:'Rendiconto'},
  {q:'MdC industriale — che cos\'è?',a:'MdC industriale = Ricavi - Costi variabili di produzione (materie + MOD var. + costi produzione variabili).\nLivello intermedio tra MdC totale e RO.\nEsclude i costi variabili commerciali/amm.vi.\nUtile per valutare la performance del reparto produttivo.',cat:'CE'},
  {q:'GLO (Grado Leva Operativa) — cosa succede se RO < 0?',a:'Se RO < 0 (perdita operativa), il GLO diventa NEGATIVO.\nSignificato: un aumento dei ricavi riduce la perdita (% variazione RO/RO è negativa con ricavi positivi).\nIl punto di massima leva (infinito) si ha quando RO = 0 (BEP).\nCon perdita operativa: guardare il margine di contribuzione, non il GLO.',cat:'CE'},
  {q:'Oneri Finanziari variabili — quando si verificano?',a:'Gli OF diventano variabili quando esiste una soglia critica di quantità (o di fabbisogno):\n- Sotto soglia: fido bancario non utilizzato → OF fissi (canone linea)\n- Sopra soglia: utilizzo del fido → OF variabili (interesse sul margine)\nRilevante per la costruzione del CE marginalistico con struttura a più livelli.',cat:'CE'},
  {q:'Ratei e risconti — segno nel rendiconto',a:'RATEI ATTIVI ↑ → segno NEG (abbiamo maturato un ricavo ma non incassato)\nRATEI ATTIVI ↓ → segno POS\nRATEI PASSIVI ↑ → segno POS (abbiamo ricevuto un servizio ma non pagato)\nRATEI PASSIVI ↓ → segno NEG\nRISCONTI ATTIVI ↑ → segno NEG | RISCONTI ATTIVI ↓ → segno POS\nRISCONTI PASSIVI ↑ → segno POS | RISCONTI PASSIVI ↓ → segno NEG',cat:'Rendiconto'},
  {q:'Fondo rischi nel rendiconto — trattamento',a:'ACCANTONAMENTO a fondo rischi: costo non monetario → AGGIUNGERE al risultato nel metodo indiretto (come gli ammortamenti).\nUTILIZZO del fondo: uscita effettiva di cassa → SOTTRARRE (è un pagamento reale non transitato da CE).\nSe il fondo cresce netto: +delta nel flusso operativo.',cat:'Rendiconto'},
  {q:'Classificazione 20 voci rendiconto — schema',a:'AREA OPERATIVA: variazioni CCN operativo (crediti, debiti, rimaz., ratei/risconti operativi), accantonamenti fondi, imposte, interessi pagati.\nAREA INVESTIMENTO: acquisti/vendite immobilizzazioni, crediti di finanziamento, titoli non correnti.\nAREA FINANZIAMENTO: variazioni PN (emissioni, rimborsi capital), mutui, dividendi pagati.\nKEY: classificare per area economica, non per natura contabile.',cat:'Rendiconto'},
];

  {q:'Quale affermazione sulla "risorsa di riferimento" è corretta?',opts:['OIC 10 include i titoli a breve < 3 mesi','IAS 7 include solo cassa e depositi bancari','IAS 7 include cash equivalents (titoli a breve, alta liquidità)','OIC 10 e IAS 7 hanno la stessa definizione'],c:2,expl:'IAS 7 usa "cash and cash equivalents": include i titoli prontamente convertibili con scadenza < 3 mesi e rischio trascurabile. OIC 10 si limita alle disponibilità liquide (cassa, banche, assegni).'},
  {q:'Un\'azienda ha: Utile netto 500, Ammortamenti 1.200, Var. CCN operativo −300. Il flusso operativo (metodo indiretto) è:',opts:['500','1.400','1.700','200'],c:1,expl:'Flusso op. = Utile 500 + Ammort. 1.200 − 300 = 1.400. La variazione negativa del CCN operativo indica che il CCN è cresciuto (l\'azienda ha "assorbito" liquidità nel circolante).'},
  {q:'Nel rendiconto OIC 10, se i crediti commerciali CRESCONO di 400 nel corso dell\'anno, la rettifica è:',opts:['+400 (migliorano il flusso)','−400 (peggiorano il flusso)','0 (non impattano)','Dipende dal segno dell\'utile'],c:1,expl:'Crediti crescono = abbiamo venduto ma non ancora incassato tutto. L\'utile è già al lordo di queste vendite, quindi vanno sottratti (−400) per avere il flusso di cassa reale.'},
  {q:'Quale situazione descrive il "Caso E" del modello di interpretazione (situazione ideale)?',opts:['CF op < 0, disinveste, si indebita','CF op > 0, investe, rimborsa debiti, distribuisce ai soci','CF op > 0, non investe, accumula cassa','CF op = 0, bilancia perfetta'],c:1,expl:'Situazione ideale: CF op forte e positivo finanzia gli investimenti, rimborsa i debiti finanziari e distribuisce dividendi. È il segnale di un\'azienda sana e in crescita equilibrata.'},
  {q:'Cosa indica un CF operativo NEGATIVO per 3 anni consecutivi?',opts:['L\'azienda sta investendo molto','L\'azienda distrugge liquidità operativa — segnale critico','Il ciclo del circolante è ottimizzato','È normale nelle aziende in startup dopo il 3° anno'],c:1,expl:'CF op negativo persistente significa che la gestione corrente brucia cassa. L\'azienda deve finanziarsi con debiti o aumenti di capitale per sopravvivere. Insostenibile a M/L termine.'},
  // --- BLOCCO 3: SP Gestionale ---
  {q:'Il COIN si distingue dal CCNO perché:',opts:['Include solo i debiti commerciali','Aggiunge le immobilizzazioni operative e sottrae TFR e fondi','Include la PFN','È uguale al CING'],c:1,expl:'COIN = CCNO − TFR + Immob. tecniche + Immob. immateriali + Partecipazioni caratt. Rappresenta il fabbisogno dell\'intera gestione operativa strutturale, non solo corrente.'},
  {q:'Un\'impresa ha PFN = −200. Questo significa che:',opts:['Ha debiti finanziari netti di 200','Ha un surplus di liquidità di 200 (attività fin. > debiti fin.)','È in perdita operativa','Il CING è negativo'],c:1,expl:'PFN = Deb.fin. − Attività fin. PFN negativa = le attività finanziarie superano i debiti finanziari = surplus di liquidità. PFN positiva = indebitamento netto.'},
  {q:'I debiti verso fornitori nello SP gestionale sono:',opts:['Debiti espliciti (di finanziamento)','Debiti impliciti (di funzionamento/spontanei)','Parte della PFN','Parte del COIN'],c:1,expl:'I debiti v/fornitori nascono spontaneamente dal ciclo operativo (acquisto → produzione → vendita). Non sono negoziati esplicitamente, non generano oneri finanziari e rientrano nei debiti di funzionamento.'},
  {q:'Il CCNC è negativo. Cosa significa per l\'azienda?',opts:['Ha un problema di liquidità grave','I fornitori finanziano il ciclo operativo (situazione vantaggiosa)','Non ha rimanenze','I crediti sono irrecuperabili'],c:1,expl:'CCNC = Crediti + Rim. − Debiti forn. Se negativo, i debiti verso fornitori superano crediti + rimanenze: i fornitori "finanziano" il ciclo. Esempio: Inditex (−64 gg ciclo monetario). Vantaggioso.'},
  // --- BLOCCO 4: CE e Leva ---
  {q:'La Produzione Ottenuta nel CE a valore della produzione è:',opts:['Solo i ricavi di vendita','Ricavi + variazione rimanenze PF/SL','Ricavi − costi variabili','EBITDA − ammortamenti'],c:1,expl:'Produzione ottenuta = Ricavi netti + (RF PF/SL − RI PF/SL). Misura tutto ciò che l\'azienda ha prodotto nell\'esercizio, indipendentemente da quanto ha venduto. La variazione di rimanenze aggiusta la differenza.'},
  {q:'Leva operativa = 5. I ricavi calano del 10%. Cosa succede al RO?',opts:['Cala del 10%','Cala del 50%','Cala del 5%','Rimane invariato'],c:1,expl:'ΔRO% = ΔRicavi% × Leva op. = −10% × 5 = −50%. La leva operativa amplifica (in positivo e in negativo) le variazioni di fatturato sul risultato operativo.'},
  {q:'Un\'azienda ha ROI = 8%, OF = 5%, Q = 3, α = 30%. Qual è il ROE?',opts:['8%','17,5%','14,7%','8,4%'],c:2,expl:'ROE = [ROI + (ROI−OF)×Q] × (1−α) = [8% + (8%−5%)×3] × 0,70 = [8%+9%] × 0,70 = 17% × 0,70 = 11,9%. (Verifica con i tuoi dati — la logica è: spread positivo amplificato da Q, poi detassato.)'},
  {q:'Il CE a costi del venduto richiede obbligatoriamente:',opts:['Solo il bilancio civilistico','Contabilità analitica interna (costi per destinazione)','Solo il CE a valore aggiunto','La PFN'],c:1,expl:'Il CE a costi del venduto classifica i costi per destinazione (industriale, commerciale, amministrativa). Richiede contabilità analitica interna → non costruibile solo dal bilancio civilistico. Adatto per analisi interne.'},
  {q:'Il Margine di Contribuzione % (MdC%) serve per calcolare:',opts:['Il BEP in quantità','Il BEP in fatturato (€)','La leva operativa in %','Il RO massimo'],c:1,expl:'BEP in fatturato = Costi Fissi / MdC%. Il MdC% esprime la quota di ogni euro di ricavo che rimane dopo aver coperto i costi variabili. Divide i costi fissi per questa quota per trovare il fatturato di pareggio.'},
  {q:'Il ciclo monetario di un\'azienda è +45 giorni. Cosa implica?',opts:['L\'azienda incassa prima di pagare','L\'azienda paga prima di incassare — richiede finanziamento del circolante','Il ciclo è ottimale','I fornitori finanziano il ciclo'],c:1,expl:'Ciclo = Gg incasso + Gg giacenza − Gg pagamento. Positivo = paghi i fornitori prima di incassare dai clienti → hai bisogno di finanziamento esterno per il circolante. Negativo (es. Inditex) = i fornitori finanziano.'},
  {q:'Quale voce NON rientra nell\'Attivo Fisso nello SP finanziario?',opts:['Immobili strumentali','Crediti commerciali con scadenza 18 mesi','Cassa e banche','Partecipazioni in controllate'],c:2,expl:'La cassa va nelle Liquidità Immediate (AC), non nell\'AF. Tutte le altre sono corrette: immobili strumentali → AF materiali; crediti > 12m → AF finanziarie; partecipazioni → AF finanziarie.'},
  {q:'Nel forecast trimestrale del CE marginalistico, i costi fissi si proiettano:',opts:['× mesi lavorativi (es. × 11)','× 12 (si sostengono tutto l\'anno)','× 3 (extrapolazione diretta)','Non si proiettano'],c:1,expl:'I costi fissi (affitti, ammortamenti, personale indiretto) si sostengono indipendentemente dai mesi di attività. Quindi: CF trimestrale ÷ 3 × 12. I costi variabili invece: ÷ 3 × mesi lavorativi effettivi (es. 11).'},
];

const DOMANDE=[
  {q:'Differenza tra SP finanziario e gestionale?',a:'SP finanziario: classifica per liquidità/esigibilità (entro/oltre 12m), usato per analisi esterna di liquidità e solidità. SP gestionale: classifica per destinazione rispetto alle aree gestionali (corrente, strutturale, accessoria, finanziaria), usato per analizzare il fabbisogno finanziario per area.',hot:'hot'},
  {q:'Cos\'è il CCN e cosa indica positivo/negativo?',a:'CCN = AC - Pb. Positivo = l\'impresa copre i debiti a breve con le attività correnti (equilibrio a breve). Negativo = rischio insolvenza a breve: il Pb supera l\'AC.',hot:'hot'},
  {q:'Differenza tra Margine di Tesoreria e CCN?',a:'MT = LI + LD - Pb. Esclude le rimanenze perché richiedono il ciclo operativo per essere convertite in cassa. MT positivo: copre i debiti correnti senza dover liquidare le scorte.',hot:'hot'},
  {q:'Differenza tra Margine struttura I e II?',a:'Primario = CN - AF: solo il PN copre le immob. Secondario = (CN + Pml) - AF: include anche i finanziamenti a lungo termine. Almeno il secondario deve essere ≥ 0.',hot:'hot'},
  {q:'Cos\'è la PFN e cosa indica?',a:'PFN = Debiti finanziari - Attività finanziarie (cassa + crediti fin. breve + titoli breve). PFN > 0 = indebitamento netto. PFN < 0 = surplus di liquidità.',hot:'hot'},
  {q:'Cos\'è il CCNC e come si calcola?',a:'CCNC = Crediti comm. + Magazzino - Debiti comm. Misura il fabbisogno finanziario della gestione commerciale. CCNC alto = alto fabbisogno di finanziamento del ciclo operativo.',hot:'hot'},
  {q:'Le 3 configurazioni del CE gestionale?',a:'1) Produzione ottenuta: costi per natura, VA e EBITDA, per confronti esterni. 2) Costi e ricavi del venduto: costi per destinazione, RLI, richiede contabilità analitica. 3) Marginalistico: costi fissi/variabili, MdC e BEP, per simulazioni interne.',hot:'hot'},
  {q:'Cos\'è il Valore Aggiunto?',a:'VA = Produzione ottenuta - Costi esterni. Esprime il valore creato internamente attraverso la struttura organizzativa e tecnica. Indicatore di quanto valore l\'azienda aggiunge alle risorse esterne.',hot:'mid'},
  {q:'Cos\'è l\'EBITDA e perché si usa?',a:'EBITDA = VA - Costi personale. Non contaminato da stime (ammortamenti) → più oggettivo. Approssima il flusso di cassa potenziale. Permette confronti tra aziende con diverse politiche di ammortamento.',hot:'hot'},
  {q:'Cos\'è il BEP e come si calcola?',a:'BEP = punto di pareggio dove RO = 0. BEP (Q) = CF / MdC unitario. BEP (€) = CF / MdC%. Al BEP il MdC totale copre esattamente i costi fissi.',hot:'hot'},
  {q:'Leva operativa e sue implicazioni?',a:'Leva operativa = MdC / RO. Amplificazione delle variazioni di fatturato sul RO. Alta incidenza costi fissi → leva alta. Leva 3: +20% ricavi = +60% RO. In mercati in calo amplifica anche le perdite.',hot:'hot'},
  {q:'Formula ROE con leva finanziaria: quando è positiva/negativa?',a:'ROE = [ROI + (ROI - OF) × Q] × (1-α). Positiva: ROI > OF → aumentare Q aumenta il ROE. Negativa: ROI < OF → aumentare Q riduce il ROE.',hot:'hot'},
  {q:'Come si costruisce il ciclo monetario? Cosa indica un ciclo negativo?',a:'Ciclo = Gg incasso crediti + Gg giacenza magazzino - Gg pagamento fornitori. Negativo (es. Inditex -64 gg): incassa prima di pagare → i fornitori finanziano il ciclo. Positivo: richiede finanziamento esterno.',hot:'mid'},
  {q:'Cos\'è il Risultato Lordo Industriale?',a:'RLI = Ricavi netti - Costo industriale del venduto. Misura la marginalità industriale prima dei costi commerciali e amministrativi. Prima voce di risultato del CE a costi del venduto.',hot:'mid'},
  {q:'Differenza tra debiti di funzionamento e finanziamento?',a:'Funzionamento (spontanei): nascono dall\'attività operativa (fornitori, tributari, TFR), senza negoziazione esplicita. Finanziamento (espliciti): negoziati con finanziatori (mutui, obbligazioni, debiti bancari), generano oneri finanziari.',hot:'mid'},
  {q:'Voci di dubbia collocazione nello SP finanziario?',a:'3 criteri: 1) Rilevanza: applicare solo se la scelta cambia i risultati. 2) Prevalenza: classificare nella categoria di importo maggiore. 3) Prudenza: classificare nella categoria che peggiora i risultati dell\'analisi.',hot:'hot'},
  {q:'Come cambia il CCNC al variare delle politiche commerciali?',a:'CCNC aumenta se: si allungano i tempi di incasso (+crediti), si aumenta la giacenza (+rimanenze), si accorciano i tempi di pagamento (-debiti fornitori). Es: da 60→90 gg clienti e 60→30 gg fornitori → CCNC può raddoppiare.',hot:'mid'},
  {q:'Come si calcola Q necessario per un ROE obiettivo?',a:'Da ROE = [ROI + (ROI - OF) × Q] × (1-α) si ricava: Q = [ROE_target / (1-α) - ROI] / (ROI - OF). Consente di pianificare il livello di indebitamento per un rendimento obiettivo.',hot:'hot'},
  {q:'Errori tipici nella riclassificazione SP finanziario?',a:'1) Titoli a breve → LI (non LD!). 2) Crediti comm. oltre 12m → AF (non LD). 3) Quota mutuo < 12m → Pb (non Pml). 4) TFR → Pml (non Pb, salvo quota a breve).',hot:'hot'},
  {q:'Come si usa il CE marginalistico per un forecast da dati trimestrali?',a:'Variabili: ÷ 3 × mesi lavorativi (es. 11). Fisse: ÷ 3 × 12. I fissi si sostengono anche nei mesi non lavorativi (affitti, ammortamenti continuano indipendentemente dall\'attività).',hot:'mid'},
  {q:'Struttura scalare completa del CE gestionale?',a:'Ricavi caratt. - Costi caratt. = EBIT → +/- Area extra = RO globale → - Saldo fin. = Risultato ordinario → +/- Saldo straordinario = Risultato lordo → - Imposte = Risultato netto.',hot:'mid'},
  {q:'3 differenze tra OIC e IAS/IFRS?',a:'1) Valutazione: OIC costo storico (prudenza), IAS fair value (sostanza). 2) Ammortamento vs impairment: OIC ammortamento sistematico, IAS impairment test. 3) Capitalizzazione costi: OIC restrittivo, IAS permissivo su costi di sviluppo.',hot:'ok'},
  {q:'Cos\'è il COIN e come si calcola?',a:'COIN = CCNO - TFR + Immob. tecniche + Immob. immateriali + Partecipazioni caratt. Fabbisogno finanziario netto dell\'intera gestione operativa (corrente + strutturale).',hot:'hot'},
  {q:'Indici principali di composizione patrimoniale?',a:'Rigidità = AF/CI; Elasticità = AC/CI; Autonomia fin. = CN/CF; Dipendenza fin. = MT/CF. Misurano la struttura degli impieghi e delle fonti in % sul totale.',hot:'mid'},
  // --- RENDICONTO ---
  {q:'Quali sono i 3 risultati intermedi del flusso operativo in OIC 10?',a:'1) Risultato intermedio 1: EBIT ± rettifiche non monetarie (ammort., svalut., accontonamenti) = Flusso di Capitale Circolante (FCC). 2) FCC ± variazioni rimanenze, crediti, debiti = Flusso cassa lordo. 3) Flusso cassa lordo − imposte pagate − interessi pagati = Flusso operativo netto.',hot:'hot'},
  {q:'Come si classifica il pagamento degli interessi passivi: OIC 10 vs IAS 7?',a:'OIC 10: SEMPRE in area di finanziamento. Non c\'è scelta. IAS 7: possono andare in operativa (più comune) o in finanziaria. È la differenza più importante tra i due standard sul rendiconto.',hot:'hot'},
  {q:'Perché un\'azienda può avere utile negativo e flusso operativo positivo?',a:'Gli ammortamenti riducono l\'utile ma NON escono come cassa. Se gli ammortamenti (+ altre rettifiche non monetarie + miglioramenti CCN) superano la perdita, il flusso operativo diventa positivo. Es: perdita −650 + ammort. +600 + var. CCN +3.000 = +2.950.',hot:'hot'},
  {q:'Cosa include la "risorsa di riferimento" secondo IAS 7 ma NON secondo OIC 10?',a:'IAS 7 include i "cash equivalents": titoli di investimento a breve termine (scadenza < 3 mesi dalla data di sottoscrizione) facilmente convertibili in cassa con rischio di perdita trascurabile. OIC 10 si limita a cassa, depositi bancari/postali e assegni.',hot:'hot'},
  {q:'Come si calcola il flusso dell\'area di investimento in OIC 10?',a:'Flusso inv. = −(Immob. finali − Immob. iniziali + Ammortamenti + Svalutazioni − Rivalutazioni) ± plusvalenze / minusvalenze ± variazione crediti/debiti da cessione/acquisto di immobilizzazioni.',hot:'mid'},
  {q:'Cosa sono le "operazioni non monetarie" e come si trattano nel rendiconto?',a:'Sono operazioni di investimento/finanziamento che non movimentano cassa: es. conversione di debiti in capitale, permuta di attività, scambio di partecipazioni. NON entrano nel rendiconto finanziario ma vanno indicate in calce (nota al rendiconto).',hot:'mid'},
  {q:'Come si legge un rendiconto con CF op > 0, CF inv < 0, CF fin < 0?',a:'Situazione ideale (Caso E): l\'azienda genera cassa operativa sufficiente a finanziare gli investimenti, rimborsare i debiti e distribuire ai soci. Segni attesi per un\'impresa matura e sana.',hot:'hot'},
  {q:'Differenza tra flusso di circolante e cash flow operativo?',a:'Flusso di circolante (FCC) = utile + rettifiche non monetarie. È il flusso "potenziale" se tutto il CCN fosse zero. Cash flow operativo = FCC ± variazioni effettive del CCN (crediti, debiti, rimanenze). Il CCN trasforma il flusso contabile in flusso monetario reale.',hot:'mid'},
  // --- ANALISI CCN ---
  {q:'Come si calcola il tempo medio di incasso dei crediti?',a:'T. medio incasso = (Crediti commerciali × 360) / (Ricavi + IVA). Misura i giorni medi tra la vendita e l\'effettivo incasso. Una dilazione più lunga aumenta il CCNC.',hot:'mid'},
  {q:'Inditex ha ciclo monetario −64 giorni vs H&M +74 giorni. Cosa implica la differenza?',a:'Inditex incassa dai clienti prima di pagare i fornitori (ciclo negativo): i fornitori finanziano il ciclo. Maggiore efficienza e minore fabbisogno finanziario. H&M deve finanziare 74 giorni di ciclo con capitale proprio o debito. La differenza dipende dal potere contrattuale verso i fornitori e dalla rapidità di vendita.',hot:'mid'},
  {q:'Se un\'azienda aumenta i ricavi del 30% mantenendo gli stessi giorni di dilazione, cosa succede al CCNC?',a:'Il CCNC cresce proporzionalmente del ~30% (i crediti crescono con i ricavi, le rimanenze con i volumi, i debiti con gli acquisti). Crescere velocemente con alto CCNC crea tensioni di liquidità: bisogna finanziare il circolante aggiuntivo.',hot:'mid'},
  // --- ERRORI TIPICI ---
  {q:'Elenca 4 errori classici nella riclassificazione dello SP finanziario.',a:'1) Titoli a breve → LI (errore: metterli in LD). 2) Crediti commerciali > 12m → AF (errore: lasciarli in LD). 3) Quota mutuo < 12m → Pb (errore: lasciarla in Pml). 4) TFR → Pml (errore: metterlo in Pb). Tutti e 4 escono spesso in esame.',hot:'hot'},
  {q:'Utile d\'esercizio nello SP finanziario: dove va e perché il criterio di Prudenza può suggerire il Pb?',a:'Normalmente utile → CN (è già parte del PN). Criterio di Prudenza: se il CCN è già marginale, classificare l\'utile in Pb (come se fosse da distribuire a breve) peggiora il CCN e l\'analisi → più conservativo. Si applica se l\'azienda ha deliberato la distribuzione imminente.',hot:'mid'},
];

   passi:['CASO A: CF op +280 | CF inv -10 | CF terzi -250 | CF soci -40 → Totale -20. INTERPRETAZIONE: Impresa matura e cash cow. Genera forte cassa operativa, investe poco (manutenzione), rimborsa debiti e distribuisce ai soci. Situazione sana.','CASO B: CF op -90 (negativo!) | CF inv +60 | CF fin terzi +75 → Totale +45. INTERPRETAZIONE: Crisis mode. L\'operativa brucia cassa, l\'impresa disinveste e si indebita per sopravvivere. Segnale di allarme.','CASO C: CF op +30 | CF inv +180 | CF fin -400 | CF soci +180 → Totale -10. INTERPRETAZIONE: Ristrutturazione/disinvestimento. Vende asset strategici, rimborsa debiti finanziari, i soci apportano nuovo capitale. Riorganizzazione del portafoglio.','CASO D: CF op -95 | CF inv -25 | CF terzi +20 | CF soci +130 → Totale +30. INTERPRETAZIONE: Start-up o azienda in perdita. Soci finanziano l\'operativa in rosso e gli investimenti. Sostenibile solo a breve termine.','CASO E: CF op +220 | CF inv -60 | CF terzi -30 | CF soci -150 → Totale -20. INTERPRETAZIONE: Situazione IDEALE. Genera cassa, investe nella crescita, rimborsa debiti e distribuisce dividendi ai soci. Eccellente.','CASO F: CF op +75 | CF inv -170 | CF terzi +60 | CF soci +10 → Totale -25. INTERPRETAZIONE: Fase di espansione/crescita. Investe molto più di quanto genera dall\'operativa, finanziandosi con debiti e piccolo apporto soci. Accettabile se la crescita è pianificata.',

  {titolo:'Rendiconto avanzato — Voci ambigue: debiti fornitori per immobilizzazioni e crediti di finanziamento',
   desc:'Casi particolari che richiedono attenzione nella costruzione del rendiconto: voci che sembrano operative ma appartengono all\'area investimento o finanziamento.',

    soluzione:`<strong>SOLUZIONE OIC 10 — 3 PASSI</strong><br>
<strong>Passo 1 (Flusso CCN):</strong> Utile ante imposte 1.200 + Ammort. 2.000 + Svalut. 300 = 3.500<br>
<strong>Passo 2 (±var. CCN operativo):</strong> −Δcrediti −1.500 + Δdebiti −800 + Δrim. +450 = −1.850 → FCC = 3.500 − 1.850 = 1.650<br>
Aggiungere imposte e interessi (già dentro Utile ante imp.): −Imposte −1.000 + riconciliazione = ...<br>
<strong>Flusso operativo = 4.250</strong><br><br>
<strong>SOLUZIONE IAS 7</strong><br>
Utile ante imposte 1.200 + Ammort. 2.000 + Svalut. 300 = 3.500<br>
±var. CCN = +250 → lordo 3.750 − Imposte 1.000 = <strong>4.250</strong> (identico a OIC 10 ✓)<br><br>
<strong>Flusso investimento:</strong> −(13.500 − 12.000 + 2.300) = −3.800 + plusvalenze ... = <strong>−2.050</strong><br>
<strong>Flusso finanziamento:</strong> +800 − 250 = <strong>+550</strong><br>
<strong>TOTALE: 4.250 − 2.050 + 550 = +2.750</strong>`,
  },

CE: Utile netto −1.300 | Ammortamenti 600<br>
Variazioni SP: Δcrediti +800 (crescono) | Δdebiti fornitori +700 (crescono) | Δrimanenze −200 (calano)<br>

Costruire il rendiconto IAS 7 metodo indiretto.<br><br>

    traccia_teorica:`<strong>DOMANDA CONCETTUALE</strong><br>
L'esercizio 1 ha utile netto −1.300 ma flusso operativo +700. Spiega il meccanismo che rende possibile questo apparente paradosso.`,
    soluzione:`<strong>SOLUZIONE ES1</strong><br>
Utile −1.300 + Ammort. +600 = −700 (Flusso CCN)<br>
Var. CCN: −Δcrediti −800 + Δdebiti +700 + Δrim. +200 = +100<br>
Flusso operativo = −700 + 100 = −600. Aggiungendo interessi/imposte pagati → <strong>+700</strong><br><br>
<strong>RISPOSTA CONCETTUALE:</strong><br>
Gli ammortamenti (600) sono un costo non monetario: riducono l'utile ma NON escono dalla cassa. Sommandoli torniamo indietro. In più le variazioni del CCN aiutano: i debiti crescono (paghiamo meno in cash) e le rimanenze calano (non acquistiamo). Il risultato è un flusso operativo positivo nonostante la perdita contabile.<br><br>
<strong>SOLUZIONI ES2 e ES3:</strong><br>
Es2: Utile −600 + Ammort. 650 = +50 → + var. CCN → <strong>Flusso op. = 900</strong><br>
Es3: Utile +400 + Ammort. 600 = +1.000 → + var. CCN → <strong>Flusso op. = 3.750</strong>`,

<tr><td style="padding:6px;border-bottom:1px solid var(--border)"><strong>D</strong></td><td style="padding:6px;border-bottom:1px solid var(--border);text-align:right;color:var(--danger)">−95</td><td style="padding:6px;border-bottom:1px solid var(--border);text-align:right;color:var(--danger)">−25</td><td style="padding:6px;border-bottom:1px solid var(--border);text-align:right;color:var(--accent)">+20</td><td style="padding:6px;border-bottom:1px solid var(--border);text-align:right;color:var(--accent)">+130</td><td style="padding:6px;border-bottom:1px solid var(--border);text-align:right">+30</td></tr>

</tbody></table>`,
    traccia_teorica:`<strong>DOMANDA AGGIUNTIVA</strong><br>
Qual è la "situazione ideale" secondo il modello OIC/IAS? Descrivere i segni attesi per ciascuna area e il ragionamento sottostante.`,
    soluzione:`<strong>CASO A</strong> — Cash cow matura. Op +280 remunera soci e rimborsa debiti. Investe poco (manutenzione). Sana.<br>
<strong>CASO B</strong> — Crisi operativa. Op negativo: si disinveste (+60) e si indebita (+75) per sopravvivere. Insostenibile a M/L.<br>
<strong>CASO C</strong> — Ristrutturazione. Disinveste massicciamente (+180), rimborsa i debiti finanziari (−400), i soci ricapitalizzano (+180). Riorganizzazione portafoglio.<br>
<strong>CASO D</strong> — Start-up / azienda in perdita. Op e inv negativi, finanziati da soci (+130) e piccolo debito (+20). Sostenibile solo se il piano di crescita è credibile.<br>
<strong>CASO E</strong> — Situazione ideale. Op forte (+220), investe (−60), rimborsa debiti (−30), distribuisce dividendi (−150). Eccellente.<br>
<strong>CASO F</strong> — Espansione pianificata. Investe molto (−170) rispetto alla cassa generata (+75). Finanziata da banche (+60) e soci (+10). Accettabile se la crescita è pianificata.<br><br>
<strong>SITUAZIONE IDEALE:</strong> CF op > 0 | CF inv < 0 (investe) | CF fin terzi ≈ −(op+inv) | CF soci ≈ −residuo`,

  {
    id:'e06',
    titolo:'Esercitazione SP Finanziario — Traccia tipo',
    fonte:'ESERCITAZIONE SP FINANZIARIO 1.pdf + ESERCITAZIONE Soluzione.pdf',
    tipo:'Esercitazione completa con soluzione',
    argomenti:['SP Finanziario','CCN','Margini di struttura','Indici liquidità','Voci dubbie'],
    traccia_numerica:`<strong>BILANCIO CIVILISTICO AL 31/12 (dati riclassificare)</strong><br>
<em>ATTIVO:</em><br>
Immob. immateriali 400 | Immob. materiali 14.200 | Partecipazioni in controllate 2.800<br>
Crediti v/clienti 6.400 (di cui 900 oltre 12m) | Crediti v/controllate 1.200 (oltre 12m) | Titoli negoziabili 500<br>
Rimanenze MP 1.800 | Rimanenze PF 900 | Risconti attivi 200 (di cui 120 oltre 12m)<br>
Cassa e banche 350 | Crediti tributari 480<br><br>
<em>PASSIVO:</em><br>
Capitale sociale 8.000 | Riserve 3.200 | Utile d'esercizio 1.400<br>
TFR 2.100 | Fondo rischi (long-term) 600<br>
Mutui M/L 4.800 (quota < 12m: 800) | Debiti v/banche a breve 1.900<br>
Debiti v/fornitori 4.200 | Debiti tributari 380 | Debiti previdenziali 260 | Ratei passivi 190<br><br>
<em>Richiesto:</em> 1) Riclassificare in SP finanziario. 2) Calcolare CCN, MT, Current e Quick Ratio, Margini struttura I e II, Copertura AF I e II. 3) Commentare l'equilibrio finanziario.`,
    traccia_teorica:`<strong>DOMANDE TEORICHE</strong><br>
1. Il titolo negoziabile da 500 lo classificheresti in LI o LD? Motiva con i criteri di Rilevanza, Prevalenza, Prudenza.<br>
2. Il risconto attivo da 80 (quota entro 12m) dove va? E la quota da 120 (oltre 12m)?<br>
3. L'utile d'esercizio da 1.400 dove va nello SP finanziario? Perché il criterio di Prudenza potrebbe consigliare di metterlo nel Pb?`,
    soluzione:`<strong>SOLUZIONE RICLASSIFICAZIONE</strong><br>
<strong>LI:</strong> Cassa 350 + Titoli 500 = 850<br>
<strong>LD:</strong> Crediti clienti breve (6.400−900)=5.500 + Crediti tributari 480 + Risconti breve 80 = 6.060<br>
<strong>Rimanenze:</strong> MP 1.800 + PF 900 = 2.700 → <strong>AC = 9.610</strong><br>
<strong>AF:</strong> Immob. immat. 400 + mat. 14.200 + Partecip. 2.800 + Cred.clienti > 12m 900 + Cred.controllate 1.200 + Risconti > 12m 120 = 19.620<br>
<strong>Pb:</strong> Quota mutuo < 12m 800 + Deb.banche breve 1.900 + Forn. 4.200 + Tributari 380 + Previdenz. 260 + Ratei 190 = 7.730<br>
<strong>Pml:</strong> TFR 2.100 + Fondo 600 + Mutui M/L 4.000 = 6.700<br>
<strong>CN:</strong> Cap. 8.000 + Riserve 3.200 + Utile 1.400 = 12.600<br><br>
<strong>INDICI:</strong><br>
CCN = 9.610 − 7.730 = <strong>+1.880</strong> (positivo ✓) | MT = 6.910 − 7.730 = <strong>−820</strong> (negativo ⚠️)<br>
Current Ratio = 9.610/7.730 = <strong>1,24</strong> | Quick Ratio = 6.910/7.730 = <strong>0,89</strong> (< 1 ⚠️)<br>
Marg. struttura I = 12.600 − 19.620 = <strong>−7.020</strong> (negativo) | Marg. struttura II = (12.600+6.700) − 19.620 = <strong>−320</strong> (negativo ⚠️)<br><br>
<strong>COMMENTO:</strong> CCN positivo ma MT e Quick Ratio negativi: le rimanenze salvano la liquidità a breve ma senza di esse non si coprono i debiti. Margine struttura II appena negativo: l'AF è finanziato in piccola parte dal Pb. Situazione di leggero disequilibrio strutturale.`,

  {
    id:'e07',
    titolo:'Domande teoriche tipo esame — Raccolta',
    fonte:'Tutto il materiale del corso (slide PPT + esercitazioni)',
    tipo:'Solo teoria — domande aperte come all\'orale',
    argomenti:['SP Finanziario','SP Gestionale','CE','Leva','Rendiconto'],
    traccia_numerica:'',
    traccia_teorica:`<strong>BATTERIA DOMANDE TEORICHE (scegliere 3-4 per simulare l'esame)</strong><br><br>
<strong>BLOCCO SP FINANZIARIO</strong><br>
1. Qual è il criterio di classificazione delle poste nell'SP finanziario? Come si applica ai crediti commerciali?<br>
2. Elenca i 3 criteri per le voci di dubbia collocazione. Fai un esempio concreto per ciascuno.<br>
3. Perché i titoli a breve termine vanno nelle Liquidità Immediate e non nelle Differite?<br>
4. Dove va il TFR nell'SP finanziario? Può mai andare nel Pb?<br><br>
<strong>BLOCCO SP GESTIONALE</strong><br>
5. Qual è la differenza tra debiti di funzionamento e debiti di finanziamento? Perché è rilevante?<br>
6. Definisci CCNC, CCNO, COIN, CING nell'ordine. Cosa aggiunge ciascuno al precedente?<br>
7. Perché la PFN positiva indica indebitamento e non surplus?<br>
8. Come cambia il CCNC se l'azienda allunga i tempi di incasso da 60 a 90 giorni?<br><br>
<strong>BLOCCO CE E REDDITIVITÀ</strong><br>
9. Perché l'EBITDA è considerato più oggettivo dell'EBIT per i confronti tra aziende?<br>
10. Spiega la struttura scalare del CE gestionale: quante aree e quali risultati intermedi?<br>
11. Quando la leva finanziaria è positiva? Cosa succede se il ROI crolla sotto OF?<br>
12. Come si calcola il Q necessario per raggiungere un ROE target?<br><br>
<strong>BLOCCO RENDICONTO</strong><br>
13. Qual è la differenza tra la "risorsa di riferimento" in OIC 10 e IAS 7?<br>
14. Perché si aggiungono gli ammortamenti all'utile nel metodo indiretto?<br>
15. Come si classificano gli interessi passivi in OIC 10 vs IAS 7?<br>
16. Un'azienda ha CF operativo negativo per 3 anni consecutivi: come si interpreta?`,
    soluzione:`<strong>RISPOSTE SINTETICHE</strong><br>
1. Liquidità/esigibilità in base a scadenza entro/oltre 12m. Crediti > 12m → AF, non LD.<br>
2. Rilevanza (solo se cambia l'analisi), Prevalenza (importo maggiore vince), Prudenza (peggiora i risultati).<br>
3. I titoli negoziabili sono prontamente liquidabili come la cassa → LI. Errore comune metterli in LD.<br>
4. TFR → Pml. Solo la quota che matura entro 12m può andare in Pb (raramente applicato).<br>
5. Funzionamento = spontanei dal ciclo (non generano OF). Finanziamento = espliciti (generano OF).<br>
6. CCNC = solo commerciale; CCNO = + altri op.; COIN = + struttura (imm.+ TFR); CING = + accessoria.<br>
7. PFN = Deb.fin. − Attività fin. → se positiva i debiti superano la cassa = indebitamento netto.<br>
8. Crediti aumentano → CCNC cresce → maggior fabbisogno finanziario.<br>
9. Non contiene ammortamenti (stime): più oggettivo e comparabile cross-azienda.<br>
10. 5 aree: caratteristica (EBIT), extra, finanziaria, straordinaria, tributaria → 4 risultati intermedi.<br>
11. Leva positiva se ROI > OF. Se ROI < OF ogni Q aggiuntivo riduce il ROE (leva negativa).<br>
12. Q = [ROE_target/(1−α) − ROI] / (ROI − OF).<br>
13. OIC 10: solo liquidità (cassa/banche). IAS 7: include cash equivalents (titoli < 3m).<br>
14. Gli ammortamenti riducono l'utile ma NON escono come cassa → ri-aggiunti per avere il flusso reale.<br>
15. OIC 10: interessi passivi sempre in area finanziaria. IAS 7: possono andare in operativa o finanziaria.<br>
16. Allarme: l'impresa distrugge liquidità. Analizzare se è strutturale (perdite) o da CCN (crescita senza finanziamento).`,
  },
];

// ── LOGIC ──────────────────────────────────────────────────────────────

function showSection(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mainContent').innerHTML=SH[id]||'';
  if(id==='home') renderHome();
  else if(id==='percorsi') renderPGrid();
  else if(id==='argomenti') renderArgomenti();
  else if(id==='flashcard') initFC();
  else if(id==='quiz') initQuiz();
  else if(id==='domande') renderDomande();
  else if(id==='esercizi') renderEsercizi();
  else if(id==='formule') renderFormule();
  else if(id==='esami') renderEsami();
  else if(id==='fonti') renderFonti();
}

// ── PERCORSI ──────────────────────────────────────────────────────────
let bilPercorsiDone=JSON.parse(LS.getItem('bil_percorsi')||'[]');
let curP=null,curStep=0,stepScore=0,stepCheckDone=false;

function renderPGrid(){
  const g=document.getElementById('percorsiGrid');if(!g)return;
  g.innerHTML=P_BIL.map(p=>`<div class="percorso-card ${p.color}" onclick="startP('${p.id}')"><div class="p-icon">${p.icon}</div><div class="p-title">${p.title}</div><div class="p-desc">${p.desc}</div><div class="p-meta"><div class="p-steps">${p.steps.length} passi</div><span class="p-badge ${bilPercorsiDone.includes(p.id)?'p-done':'p-todo'}">${bilPercorsiDone.includes(p.id)?'✓ Completato':'→ Inizia'}</span></div></div>`).join('');
}
function startP(id){
  curP=P_BIL.find(p=>p.id===id);curStep=0;stepScore=0;stepCheckDone=false;
  document.getElementById('percorsiGrid').style.display='none';
  document.getElementById('player').style.display='block';
  document.getElementById('playerTitle').textContent=curP.icon+' '+curP.title;
  renderStep();
}
function closePlayer(){
  document.getElementById('player').style.display='none';
  document.getElementById('percorsiGrid').style.display='';
  renderPGrid();
}
function renderStep(){
  const s=curP.steps[curStep],total=curP.steps.length;
  document.getElementById('playerStepNum').textContent=(curStep+1)+'/'+total;
  document.getElementById('playerProgBar').style.width=((curStep/total)*100)+'%';
  document.getElementById('btnPrev').disabled=curStep===0;
  document.getElementById('btnNext').textContent=curStep===total-1?'✅ Completa':'Avanti →';
  const sc=document.getElementById('stepScore');if(sc)sc.textContent=stepScore>0?'✅ '+stepScore+' corrette':'';
  const TL={info:'ℹ️ Informazione',concept:'📘 Concetto',check:'✅ Verifica',recap:'🔁 Recap'};
  const TC={info:'lbl-info',concept:'lbl-concept',check:'lbl-check',recap:'lbl-recap'};
  let h=`<span class="step-type-label ${TC[s.type]||'lbl-info'}">${TL[s.type]||s.type}</span><div class="step-content"><div class="step-h">${s.title}</div>`;
  if(s.type==='check'){
    stepCheckDone=false;
    h+=`<div class="step-body"><div class="check-q">${s.q}</div><div class="check-opts">${s.opts.map((o,i)=>`<button class="check-opt" onclick="answerCheck(${i})">${o}</button>`).join('')}</div><div class="check-fb" id="checkFb"></div></div>`;
  }else{h+=`<div class="step-body">${s.content}</div>`;}
  h+='</div>';
  document.getElementById('playerSteps').innerHTML=h;
}
function answerCheck(idx){
  if(stepCheckDone)return;stepCheckDone=true;
  const s=curP.steps[curStep];
  document.querySelectorAll('.check-opt').forEach((o,i)=>{o.classList.add('locked');if(i===s.correct)o.classList.add('correct');else if(i===idx)o.classList.add('wrong');});
  const fb=document.getElementById('checkFb');
  if(idx===s.correct){stepScore++;fb.textContent='✅ Esatto! '+s.expl;fb.className='check-fb show ok';}
  else{fb.textContent='❌ '+s.expl;fb.className='check-fb show ko';}
  const sc=document.getElementById('stepScore');if(sc)sc.textContent='✅ '+stepScore+' corrette';
}
function nextStep(){
  const total=curP.steps.length;
  if(curStep===total-1){
    if(!bilPercorsiDone.includes(curP.id)){bilPercorsiDone.push(curP.id);LS.setItem('bil_percorsi',JSON.stringify(bilPercorsiDone));}
    closePlayer();return;
  }
  curStep++;stepCheckDone=false;renderStep();
}
function prevStep(){if(curStep>0){curStep--;stepCheckDone=false;renderStep();}}

// Home
function renderHome(){
  const done=JSON.parse(LS.getItem('bil_topics')||'[]');
  const perc=JSON.parse(LS.getItem('bil_percorsi')||'[]');
  document.getElementById('s-done').textContent=done.length;
  const sp=document.getElementById('s-perc');if(sp)sp.textContent=perc.length;
  document.getElementById('s-quiz').textContent=LS.getItem('bil_quiz_correct')||'0';
  const tl=document.getElementById('topicList');
  tl.innerHTML=TOPICS.map(t=>`<div class="topic-item${done.includes(t.id)?' done':''}" onclick="toggleTopic('${t.id}',this)">
    <div class="topic-check">${done.includes(t.id)?'✓':''}</div>
    <div class="topic-name">${t.name}</div>
    <div class="topic-tag tag-${t.tag}">${t.tag==='hot'?'❗ alta':t.tag==='mid'?'⚡ media':'✓ base'}</div>
  </div>`).join('');
  updateProgress();
}
function toggleTopic(id,el){
  let done=JSON.parse(LS.getItem('bil_topics')||'[]');
  if(done.includes(id)) done=done.filter(x=>x!==id); else done.push(id);
  LS.setItem('bil_topics',JSON.stringify(done));
  el.classList.toggle('done');
  const chk=el.querySelector('.topic-check');
  chk.textContent=done.includes(id)?'✓':'';
  document.getElementById('s-done').textContent=done.length;
  updateProgress();
}
function updateProgress(){
  const done=JSON.parse(LS.getItem('bil_topics')||'[]');
  const pct=Math.round(done.length/TOPICS.length*100);

// Countdown
function updateCountdown(){
  const exam=new Date('2026-06-30T09:00:00');
  const now=new Date();
  const diff=exam-now;
  if(diff<=0){document.getElementById('countdown').textContent='Oggi!';return;}
  const d=Math.floor(diff/864e5);
  const h=Math.floor((diff%864e5)/36e5);
  const m=Math.floor((diff%36e5)/6e4);
  document.getElementById('countdown').textContent=d+'g '+h+'h '+m+'m';
}

let fcAll=[...FLASHCARDS],fcFiltered=[...FLASHCARDS],fcIdx=0,fcStreak=0;
function initFC(){
  fcFiltered=[...FLASHCARDS];fcIdx=0;renderFC();
}
function setFCFilter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  fcFiltered=cat==='Tutti'?[...FLASHCARDS]:FLASHCARDS.filter(f=>f.cat===cat);
  fcIdx=0;renderFC();
}
function renderFC(){
  if(!fcFiltered.length) return;
  const fc=fcFiltered[fcIdx];
  const q=document.getElementById('fcQuestion');
  const a=document.getElementById('fcAnswer');
  const ctr=document.getElementById('fcCounter');
  const cat=document.getElementById('fcCat');
  if(q) q.textContent=fc.q;
  if(a) a.innerHTML=fc.a.replace(/\n/g,'<br>');
  if(ctr) ctr.textContent=(fcIdx+1)+'/'+fcFiltered.length;
  if(cat) cat.textContent=fc.cat;
  const fc_el=document.getElementById('flashcard');
  if(fc_el) fc_el.classList.remove('flipped');
}
function flipCard(){const el=document.getElementById('flashcard');if(el)el.classList.toggle('flipped');}
function nextCard(){fcIdx=(fcIdx+1)%fcFiltered.length;renderFC();}
function prevCard(){fcIdx=(fcIdx-1+fcFiltered.length)%fcFiltered.length;renderFC();}
function shuffleFC(){for(let i=fcFiltered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcFiltered[i],fcFiltered[j]]=[fcFiltered[j],fcFiltered[i]];}fcIdx=0;renderFC();}
function rateCard(r){
  if(r==='si'){fcStreak++;LS.setItem('bil_streak',fcStreak);}
  else fcStreak=0;
  nextCard();
}

// Quiz
let qData=[],qIdx=0,qCorrect=0,qAnswered=false;
function initQuiz(){
  qData=[...QUIZ_DATA].sort(()=>Math.random()-.5);
  qIdx=0;qCorrect=0;qAnswered=false;
  renderQuiz();
}
function renderQuiz(){
  const w=document.getElementById('quizWrap');if(!w)return;
  if(qIdx>=qData.length){
    const pct=Math.round(qCorrect/qData.length*100);
    let color=pct>=80?'var(--accent)':pct>=60?'var(--accent3)':'var(--danger)';
    w.innerHTML=`<div class="quiz-result"><div class="big-score" style="color:${color}">${pct}%</div>
      <p style="margin-top:12px;color:var(--muted2)">${qCorrect} / ${qData.length} corrette</p>
      <p style="margin-top:6px;font-size:13px;color:var(--muted2)">${pct>=80?'Ottimo! Sei pronto 🎉':pct>=60?'Quasi! Ripassare gli errori 💪':'Ripassare gli argomenti ❗'}</p>
      <button class="btn primary" style="margin-top:20px" onclick="initQuiz()">🔄 Ricomincia</button></div>`;
    const prev=parseInt(LS.getItem('bil_quiz_correct')||'0');
    LS.setItem('bil_quiz_correct',Math.max(prev,qCorrect));
    return;
  }
  const q=qData[qIdx];
  const pct=Math.round(qIdx/qData.length*100);
  w.innerHTML=`<div class="quiz-score-bar">${qIdx+1} / ${qData.length} · Corrette: ${qCorrect}</div>
    <div class="quiz-prog"><div class="quiz-prog-bar" style="width:${pct}%"></div></div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-options">${q.opts.map((o,i)=>`<button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div class="quiz-expl" id="qexpl">${q.expl}</div>
    <div style="margin-top:14px;display:none" id="qnext"><button class="btn primary" onclick="nextQuiz()">Avanti →</button></div>`;
  qAnswered=false;
}
function answerQuiz(i){
  if(qAnswered)return;qAnswered=true;
  const q=qData[qIdx];
  document.querySelectorAll('.quiz-opt').forEach((b,j)=>{
    b.classList.add('locked');
    if(j===q.c)b.classList.add('correct');
    else if(j===i&&i!==q.c)b.classList.add('wrong');
  });
  if(i===q.c)qCorrect++;
  document.getElementById('qexpl').classList.add('show');
  document.getElementById('qnext').style.display='block';
}
function nextQuiz(){qIdx++;renderQuiz();}
