  {file:'Costruzione rendiconto finanziario OIC 10.ppt',tipo:'Slide teoria (47 slide)',stato:'✅ Letto (47 slide estratte)',estratto:['Art. 2423 c.c.: rendiconto finanziario obbligatorio (esonero per bilancio abbreviato e micro imprese)','Risorsa di riferimento OIC 10: disponibilità liquide (depositi bancari/postali, assegni, denaro)','3 aree: gestione reddituale (operativa), investimento, finanziamento','Metodo diretto o indiretto; divieto di compensazione; evidenziazione flussi distinti','Flusso operativo indiretto: 1) Calcolo risultato operativo (EBIT) → 2) Flusso CCN (rettifiche non monetarie) → 3) Flusso cassa (±var. rimanenze, crediti, debiti) → 4) ±imposte, interessi, altri op.','Variazione crediti: se CF > CI → segno negativo; se CF < CI → segno positivo; includere svalutazioni','Variazione debiti: se DF > DI → segno positivo; se DF < DI → segno negativo','Variazione rimanenze: RF > EI → segno negativo; RF < EI → segno positivo','Ratei attivi: RAF > RAI → segno negativo; Ratei passivi: RPF > RPI → segno positivo','Flusso investimento = -(val. bilancio finali - iniziali + ammortamenti + svalutazioni - rivalutazioni) ± plusvalenze/minusvalenze ± var. crediti/debiti da immobili','Flusso finanziamento: emissione azioni, rimborso debiti fin., dividendi pagati, apporti/rimborsi soci','Interessi e dividendi: presentati distintamente; interessi passivi sempre in operativa (OIC 10)','Operazioni non monetarie (conversione debiti in capitale, permute) NON vanno nel rendiconto'],aggiunto:'Teoria completa OIC 10: procedimento step-by-step, regole di segno per ogni variazione, casi speciali. Integra e completa esercizi tipo rendiconto.'},
  {file:'IAS7.ppt',tipo:'Slide teoria (13 slide)',stato:'✅ Letto (13 slide estratte)',estratto:['Risorsa di riferimento IAS 7: cash and cash equivalents (include titoli a breve con scadenza < 3 mesi, facilmente convertibili, rischio perdita trascurabile)','Scoperti di c/c compresi se compensazione con la cassa è prassi aziendale','3 aree: operativa, investimento, finanziaria — stessa struttura OIC 10','Metodo diretto (analitico): incassi da clienti - pagamenti fornitori/personale = cash flow ops','Metodo indiretto: utile ante imposte + rettifiche (ammortamenti, accantonamenti, svalutazioni, minusvalenze) + var. CCN','Metodo "misto": ricavi op. - costi op. = RO pre var. CCN → poi aggiustamenti CCN','Interessi e dividendi: possono essere classificati in QUALSIASI delle tre aree (differenza chiave vs OIC 10!)','Interessi pagati solitamente in operativa o finanziaria; dividendi ricevuti in operativa o investimento','Imposte: preferibilmente in operativa; suddivise tra aree solo se specificamente attribuibili','Schema: Risultato op. → Flusso CCN corrente → Cash flow corrente → Cash flow operativo'],aggiunto:'Differenze chiave IAS 7 vs OIC 10: risorsa di riferimento (cash equivalents), flessibilità classificazione interessi/dividendi. Aggiornate flashcard e domande d\'esame.'},

  {file:'Introduzione al rendiconto.ppt',tipo:'Slide teoria (20 slide)',stato:'✅ Letto (20 slide estratte)',estratto:['Flusso finanziario vs reddito: principio di competenza finanziaria vs competenza economica','Modello concettuale: variazione stock SP(N) - SP(N-1) = flusso del periodo','3 macro-classi variazioni finanziarie: gestione reddituale, movimenti attività, movimenti passività/PN','Variazioni non finanziarie: ammortamenti, conversione obbligazioni in azioni, conferimenti non monetari — NON entrano nel rendiconto','Metodo diretto: Ricavi monetari - Costi monetari = Cash flow','Metodo indiretto: U + Costi non monetari - Ricavi non monetari = CF (equivalente per algebra)','Poiché U = R - C = Cm + Cnm - Rm - Rnm → Rm - Cm = U + Cnm - Rnm (dimostrazione)','Flusso CCN corrente: U + ammortamenti + svalutazioni + accantonamenti (esclude var. CCN)','Dal flusso di circolante al cash flow: aggiungere variazioni rimanenze, crediti v/clienti, debiti v/fornitori','Finalità FASB: valutare capacità azienda di generare cash flow positivi, pagare debiti, dividendi, finanziamento esterno','Finalità IASB: valutare capacità generare cash/equivalenti + rendicontare il management'],aggiunto:'Introduzione teorica rendiconto. Base concettuale per capire perché si parte dall\'utile nel metodo indiretto.'},
  {file:'Esercizi intepretazione OIC 090525.xlsx',tipo:'Esercizi (2 fogli, 6 casi)',stato:'✅ Letto (6 casi A-F estratti)',estratto:['Caso A: CF op +280, CF inv -10, CF terzi -250, CF soci -40 → totale -20. Impresa matura, autosostentata, distribuisce a soci e ripaga debiti.','Caso B: CF op -90 (negativo!), CF inv +60, CF fin +75 → totale +45. Crisis mode: disinveste e si indebita per coprire il buco operativo.','Caso C: CF op +30, CF inv +180, CF fin -400, CF soci +180 → totale -10. Disinveste pesantemente, rimborsa debiti, soci apportano capitale.','Caso D: CF op -95, CF inv -25, CF terzi +20, CF soci +130 → totale +30. Start-up/crescita: soci finanziano le perdite operative e gli investimenti.','Caso E: CF op +220, CF inv -60, CF terzi -30, CF soci -150 → totale -20. Situazione ideale: genera cassa, investe, rimborsa e distribuisce.','Caso F: CF op +75, CF inv -170, CF terzi +60, CF soci +10 → totale -25. Espansione investimenti finanziata da debiti e soci; operativa non sufficiente da sola.'],aggiunto:'6 casi interpretazione rendiconto trascritti come esercizi nella sezione Esercizi (esercizi 7-12 dell\'esercitazione). Tipici dell\'esame Greco.'},

function renderFonti(){
  const letti=FONTI.filter(f=>f.stato.startsWith('✅'));
  const warning=FONTI.filter(f=>f.stato.startsWith('⚠️'));
  document.getElementById('fontiContainer').innerHTML=`
  <div class="stat-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-num green">${letti.length}</div><div class="stat-label">File letti e analizzati</div></div>
    <div class="stat-card"><div class="stat-num yellow">${warning.length}</div><div class="stat-label">File con lettura parziale</div></div>
    <div class="stat-card"><div class="stat-num blue">${FONTI.length}</div><div class="stat-label">Totale file nel materiale</div></div>
    <div class="stat-card"><div class="stat-num pink">${Math.round(letti.length/FONTI.length*100)}%</div><div class="stat-label">Copertura automatica</div></div>
  </div>
  ${FONTI.map((f,i)=>`
  <div class="acc-item" id="fonte-${i}">
    <div class="acc-header" onclick="document.getElementById('fonte-${i}').classList.toggle('open')">
      <span style="font-size:13px;min-width:1.5rem">${f.stato.startsWith('✅')?'✅':'⚠️'}</span>
      <span class="acc-title" style="font-size:12px">${f.file}</span>
      <span class="topic-tag ${f.stato.startsWith('✅')?'tag-ok':'tag-mid'}" style="margin-right:8px">${f.tipo}</span>
      <span class="acc-chev">▼</span>
    </div>
    <div class="acc-body"><div class="acc-inner">
      <div class="sec-lbl">Stato lettura</div>
      <p style="font-size:13px;color:var(--muted2)">${f.stato}</p>
      <div class="sec-lbl">Contenuto estratto</div>
      <ul>${f.estratto.map(e=>`<li>${e}</li>`).join('')}</ul>
      <div class="sec-lbl">Cosa ha contribuito alla dashboard</div>
      <div class="hbox" style="font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--muted2)">${f.aggiunto}</div>
    </div></div>
  </div>`).join('')}`;
}


// Init on load
function initMotiv(){
  const el=document.getElementById('motivStrip');
  if(!el) return;
  const today=new Date().toDateString();
  const key='bil_motiv_'+today;
  let idx=parseInt(LS.getItem(key)||'0');
  el.textContent=MOTIV[idx%MOTIV.length];
  LS.setItem(key,idx+1);
}
function init(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  mc.innerHTML=SH.home;
  renderHome();
  updateProgress();
  updateCountdown();
  setInterval(updateCountdown,60000);
  initMotiv();
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
